name: CI + Security + Docker Scan

on:
  push:
    branches: ["main"]
    paths:
      - 'auth-service/**'
      - '!auth-service/README.md'
  pull_request:
    branches: ["main"]
    paths:
      - 'auth-service/**'
      - '!auth-service/README.md'

env:
  SERVICE_NAME: auth-service

jobs:
  # JOB 1: Validação de Código e Segurança Estática
  build-test-security:
    name: Build + Test + Lint + Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.SERVICE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.SERVICE_NAME }}/go.mod

      - name: Download dependencies
        run: |
          echo "### Baixando dependências do Go..."
          go mod tidy
          echo "### Dependências baixadas com sucesso!"

      - name: Build
        run: |
          echo "### Iniciando compilação (Build)..."
          go build -v ./...
          echo "### Build finalizado!"

      - name: Run Unit Tests
        run: |
          echo "### Executando testes unitários..."
          go test -v ./...
          echo "### Testes concluídos!"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ${{ env.SERVICE_NAME }}
          version: latest

      - name: Run Trivy (SCA - Dependency Scan)
        # Analisa se as bibliotecas (dependências) têm vulnerabilidades conhecidas
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: ./${{ env.SERVICE_NAME }}
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Run gosec (SAST - Code Scan)
        # Analisa o seu código fonte em busca de falhas de segurança (ex: senhas hardcoded)
        uses: securego/gosec@master
        with:
          args: ./${{ env.SERVICE_NAME }}/...

  # JOB 2: Empacotamento e Imagem Docker
  docker:
    name: Docker Build + Container Scan
    runs-on: ubuntu-latest
    needs: build-test-security
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          echo "### Criando imagem Docker..."
          IMAGE_NAME=${{ env.SERVICE_NAME }}:${GITHUB_SHA}
          docker build -t $IMAGE_NAME ./${{ env.SERVICE_NAME }}
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "### Imagem $IMAGE_NAME criada com sucesso!"

      - name: Scan Docker Image (Trivy)
        # Analisa a imagem Docker pronta (OS + Dependências) em busca de vulnerabilidades
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and Push Image to ECR
        run: |
          echo "### Iniciando Push para o ECR..."
          COMMIT_HASH=${GITHUB_SHA::7}
          ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY=${{ env.SERVICE_NAME }}

          # Verifica se o repositório existe na AWS, se não, cria.
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY --region ${{ secrets.AWS_REGION }} \
          || aws ecr create-repository --repository-name $ECR_REPOSITORY --region ${{ secrets.AWS_REGION }}

          docker tag ${{ env.IMAGE_NAME }} $ECR_REGISTRY/$ECR_REPOSITORY:$COMMIT_HASH
          docker tag ${{ env.IMAGE_NAME }} $ECR_REGISTRY/$ECR_REPOSITORY:latest

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$COMMIT_HASH
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "### Push para ECR finalizado com as tags: $COMMIT_HASH e latest"

  # JOB 3: Atualização do Manifesto (GitOps)
  gitops:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update image tag in Manifest
        # Atualiza a tag da imagem no arquivo YAML do Kubernetes para o ArgoCD/Flux detectar
        run: |
          COMMIT_HASH=${GITHUB_SHA::7}
          FILE_PATH="k8s/${{ env.SERVICE_NAME }}/deployment.yml"
          echo "### Atualizando tag no arquivo $FILE_PATH para: $COMMIT_HASH"
          
          sed -i "s|image: .*${{ env.SERVICE_NAME }}:.*|image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.SERVICE_NAME }}:$COMMIT_HASH|g" $FILE_PATH

      - name: Commit and Push changes
        run: |
          echo "### Configurando Git e enviando alterações..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add k8s/${{ env.SERVICE_NAME }}/deployment.yml
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "### Status: Nenhuma alteração encontrada no manifesto."
          else
            git commit -m "chore: update ${{ env.SERVICE_NAME }} image to ${GITHUB_SHA::7}"
            git push origin main
            echo "### Status: Manifesto atualizado no repositório com sucesso!"
          fi
