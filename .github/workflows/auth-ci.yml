name: CI + Security + Docker Scan 

on:
  push:
    branches: [ "main" ]
    paths:
      - 'auth-service/**'
      - '!auth-service/README.md'

  pull_request:
    branches: [ "main" ]
    paths:
      - 'auth-service/**'
      - '!auth-service/README.md'

env:
  SERVICE_NAME: auth-service

jobs:
  build-test-security:
    name: Build + Test + Lint + Security
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.SERVICE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/${{ env.SERVICE_NAME }}/go.mod

      # -----------------------------
      # 1. BUILD & UNIT TEST
      # -----------------------------
      - name: Download dependencies
        run: go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Run Unit Tests
        run: go test -v ./...

      # -----------------------------
      # 2. LINTER
      # -----------------------------
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ${{ env.SERVICE_NAME }}
          version: latest

      # -----------------------------
      # 3. SCA - Dependency Scan
      # -----------------------------
      - name: Run Trivy (SCA - Filesystem)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: ./${{ env.SERVICE_NAME }}
          severity: 'CRITICAL'
          exit-code: '1'

      # -----------------------------
      # 4. SAST - Code Scan
      # -----------------------------
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./${{ env.SERVICE_NAME }}/...

# ============================================================
#                     DOCKER SECTION
# ============================================================
#                           ##         .
#                     ## ## ##        ==
#                  ## ## ## ## ##    ===
#              /"""""""""""""""""\___/ ===
#         ~~~ {~~ ~~~~ ~~~ ~~~~ ~~ ~ /  ===- ~~~
#              \______ o          __/
#                \    \        __/
#                 \____\______/
# ============================================================

  docker:
    name: Docker Build + Container Scan
    runs-on: ubuntu-latest
    needs: build-test-security

    steps:
      - name: Checkout
        uses: actions/checkout@v4

# ============================================================

      # -----------------------------
      # 5. Docker Build
      # -----------------------------
      - name: Build Docker Image
        run: |
          IMAGE_NAME=$SERVICE_NAME:${GITHUB_SHA}
          docker build -t $IMAGE_NAME ./$SERVICE_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      # -----------------------------
      # 6. Container Scan (Trivy)
      # -----------------------------
      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          severity: 'CRITICAL'
          exit-code: '1'
