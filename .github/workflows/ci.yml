name: CI + Security + Docker Scan (No Push)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  GO_VERSION: 1.24
  IMAGE_NAME: auth-service

jobs:

  build-test-security:
    name: Build + Test + Lint + Security
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auth-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # -----------------------------
      # 1. BUILD & UNIT TEST
      # -----------------------------
      - name: Download dependencies
        run: go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Run Unit Tests
        run: go test -v ./...

      # -----------------------------
      # 2. LINTER
      # -----------------------------
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: auth-service
          version: latest

      # -----------------------------
      # 3. SCA - Dependency Scan
      # -----------------------------
      - name: Run Trivy (SCA - Filesystem)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: './auth-service'
          severity: 'CRITICAL'
          exit-code: '1'

      # -----------------------------
      # 4. SAST - Code Scan
      # -----------------------------
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./auth-service/...

# ============================================================
#                     DOCKER SECTION
# ============================================================
#                           ##         .
#                     ## ## ##        ==
#                  ## ## ## ## ##    ===
#              /"""""""""""""""""\___/ ===
#         ~~~ {~~ ~~~~ ~~~ ~~~~ ~~ ~ /  ===- ~~~
#              \______ o          __/
#                \    \        __/
#                 \____\______/
# ============================================================
  docker:
    name: Docker Build + Container Scan
    runs-on: ubuntu-latest
    needs: build-test-security

    steps:
      - name: Checkout
        uses: actions/checkout@v4
# ============================================================
#                           ##         .
#                     ## ## ##        ==
#                  ## ## ## ## ##    ===
#              /"""""""""""""""""\___/ ===
#         ~~~ {~~ ~~~~ ~~~ ~~~~ ~~ ~ /  ===- ~~~
#              \______ o          __/
#                \    \        __/
#                 \____\______/
# ============================================================

      # -----------------------------
      # 5. Docker Build
      # -----------------------------
      - name: Build Docker Image
        run: |
          IMAGE_NAME=${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE_NAME ./auth-service
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      # -----------------------------
      # 6. Container Scan (Trivy)
      # -----------------------------
      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          severity: 'CRITICAL'
          exit-code: '1'

      # -----------------------------
      # 7. Configure AWS Credentials
      # -----------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -----------------------------
      # 8. Login to Amazon ECR
      # -----------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # -----------------------------
      # 9. Tag and Push Docker Image
      # -----------------------------
      - name: Tag and Push Image to ECR
        run: |
          COMMIT_HASH=${GITHUB_SHA::7}
          
          ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY=auth-service
          
          docker tag $IMAGE_NAME $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
